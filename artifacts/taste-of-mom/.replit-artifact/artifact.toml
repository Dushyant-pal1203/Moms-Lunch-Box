kind = "web"
previewPath = "/"
title = "Taste of Mom's Hand"
version = "1.0.0"
id = "artifacts/taste-of-mom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25574

[services.development]
run = "pnpm --filter @workspace/taste-of-mom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/taste-of-mom", "run", "build" ]
publicDir = "artifacts/taste-of-mom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25574"
BASE_PATH = "/"
